[build]
  command = "npm run build"
  publish = "dist"
  ignore_installed_plugins = ["@netlify/plugin-nextjs"]

[dev]
  command = "npm run dev"
  targetPort = 8081
  framework = "#custom"

# Canonical redirects: collapse all http/www variants to https://skillcruit.app
# in a single 301 hop so Google never sees a redirect chain.
# These must come BEFORE the SPA catch-all redirect.
[[redirects]]
  from = "http://www.skillcruit.app/*"
  to = "https://skillcruit.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.skillcruit.app/*"
  to = "https://skillcruit.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://skillcruit.app/*"
  to = "https://skillcruit.app/:splat"
  status = 301
  force = true

# SPA redirect - all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security and cache headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache fonts
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache HTML
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Don't cache sitemap and robots
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/plain; charset=utf-8"
